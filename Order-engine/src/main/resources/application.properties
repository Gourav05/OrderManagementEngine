# Application name
spring.application.name=Order-engine

# Datasource (H2 default, override with env vars)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:orderdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}

# HikariCP settings
spring.datasource.hikari.pool-name=${HIKARI_POOL_NAME:OrderEngineHikariCP}
spring.datasource.hikari.maximum-pool-size=${HIKARI_MAX_POOL_SIZE:10}
spring.datasource.hikari.minimum-idle=${HIKARI_MIN_IDLE:2}
spring.datasource.hikari.connection-timeout=${HIKARI_CONNECTION_TIMEOUT_MS:30000}
spring.datasource.hikari.max-lifetime=${HIKARI_MAX_LIFETIME_MS:1800000}
spring.datasource.hikari.idle-timeout=${HIKARI_IDLE_TIMEOUT_MS:600000}
spring.datasource.hikari.validation-timeout=${HIKARI_VALIDATION_TIMEOUT_MS:5000}

# JPA
spring.jpa.hibernate.ddl-auto=${JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${JPA_FORMAT_SQL:false}
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# Cache
spring.cache.type=${SPRING_CACHE_TYPE:simple}

# Server
server.port=${SERVER_PORT:8080}

## Application-specific
#app.scheduler.enabled=${APP_SCHEDULER_ENABLED:true}
#app.scheduler.poll-interval-seconds=${APP_SCHEDULER_POLL_INTERVAL_SECONDS:30}
#app.scheduler.promotion-batch-size=${APP_SCHEDULER_PROMOTION_BATCH_SIZE:50}
#app.cache.ttl-seconds=${APP_CACHE_TTL_SECONDS:60}

# Logging
logging.level.root=INFO
logging.level.com.peerisland=DEBUG

# Management
#management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.prometheus.enabled=true
management.metrics.export.simple.enabled=true

order.processing.fixed-delay-ms=50000
